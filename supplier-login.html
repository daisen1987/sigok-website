<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>供应商登录 - 闪淘严选</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="auth-page">
  <!-- 左侧品牌区 -->
  <div class="auth-brand auth-brand-accent">
    <div class="auth-brand-logo">
      <a href="index.html" style="display:flex;align-items:center;gap:10px;">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">闪淘严选</span>
      </a>
    </div>
    <h2>供应商开放平台</h2>
    <p>加入闪淘严选，享受 T+1 极速结算、AI 智能上架、低佣金运营，让好货真正触达消费者。</p>
    <div class="auth-brand-features">
      <div class="abf-item">
        <div class="abf-icon">💰</div>
        <span>T+1 隔日结算，90% 极速到账</span>
      </div>
      <div class="abf-item">
        <div class="abf-icon">🤖</div>
        <span>AI 60秒自动上架，省时省力</span>
      </div>
      <div class="abf-item">
        <div class="abf-icon">📊</div>
        <span>全网透明比价，买贵退差保障</span>
      </div>
      <div class="abf-item">
        <div class="abf-icon">⭐</div>
        <span>AAA 等级免保证金，3% 超低佣金</span>
      </div>
    </div>
    <div class="auth-brand-bg-circle"></div>
    <div class="auth-brand-bg-circle2"></div>
  </div>

  <!-- 右侧表单区 -->
  <div class="auth-form-side">
    <div class="auth-form-inner">
      <div class="auth-back">
        <span>←</span>
        <a href="index.html">返回首页</a>
      </div>

      <!-- Tab 切换 -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">供应商登录</button>
        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">新供应商注册</button>
      </div>

      <!-- 登录表单 -->
      <div id="loginForm" class="auth-form">
        <h3>欢迎回来</h3>
        <p class="subtitle">使用手机号验证码快速登录</p>
        <div class="form-stack">
          <div class="input-group input-with-btn">
            <input type="tel" id="loginPhone" placeholder="请输入手机号" maxlength="11" />
            <button class="otp-btn" id="loginOtpBtn" onclick="sendOtp('login')">获取验证码</button>
          </div>
          <div class="input-group">
            <input type="text" id="loginOtp" placeholder="请输入验证码" maxlength="6" />
          </div>
          <button class="auth-submit auth-submit-accent" onclick="handleLogin()">登录</button>
        </div>
        <div style="text-align:center;margin-top:20px;">
          <span style="font-size:14px;color:#8A9AB0">还没有账号？</span>
          <span class="form-link" onclick="switchTab('register')">立即注册</span>
        </div>
        <div style="text-align:center;margin-top:8px;">
          <a href="join.html" style="font-size:13px;color:#8A9AB0;">申请入驻 →</a>
        </div>
      </div>

      <!-- 注册表单 -->
      <div id="registerForm" class="auth-form" style="display:none">
        <h3>注册供应商账号</h3>
        <p class="subtitle">填写信息，即刻开启销售之旅</p>
        <div class="form-stack">
          <div class="input-group">
            <input type="text" id="regShopName" placeholder="店铺名称（例：张记农产品旗舰店）" />
          </div>
          <div class="input-group input-with-btn">
            <input type="tel" id="regPhone" placeholder="联系人手机号" maxlength="11" />
            <button class="otp-btn" id="regOtpBtn" onclick="sendOtp('register')">获取验证码</button>
          </div>
          <div class="input-group">
            <input type="text" id="regOtp" placeholder="请输入验证码" maxlength="6" />
          </div>
          <div class="input-group">
            <input type="password" id="regPwd" placeholder="设置密码（8位以上）" />
          </div>
          <div class="input-group">
            <input type="password" id="regPwd2" placeholder="确认密码" />
          </div>
          <div class="agree-row">
            <input type="checkbox" id="regAgree" />
            <label for="regAgree">我已阅读并同意 <a href="#">《供应商服务协议》</a> 和 <a href="#">《隐私政策》</a></label>
          </div>
          <button class="auth-submit auth-submit-accent" onclick="handleRegister()">注册并登录</button>
        </div>
        <div style="text-align:center;margin-top:20px;">
          <span style="font-size:14px;color:#8A9AB0">已有账号？</span>
          <span class="form-link" onclick="switchTab('login')">直接登录</span>
        </div>
      </div>

      <div id="msgBox" style="margin-top:16px;font-size:14px;text-align:center;color:#EF4444;display:none"></div>
    </div>
  </div>
</div>

<script src="main.js"></script>
<script>
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabRegister').classList.toggle('active', !isLogin);
  document.getElementById('loginForm').style.display = isLogin ? '' : 'none';
  document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
  document.getElementById('msgBox').style.display = 'none';
}

function showMsg(msg, color) {
  const box = document.getElementById('msgBox');
  box.textContent = msg;
  box.style.color = color || '#EF4444';
  box.style.display = 'block';
}

let countdownTimer = null;
function startCountdown(btnId) {
  let count = 60;
  const btn = document.getElementById(btnId);
  btn.disabled = true;
  btn.textContent = count + 's';
  countdownTimer = setInterval(() => {
    count--;
    btn.textContent = count + 's';
    if (count <= 0) {
      clearInterval(countdownTimer);
      btn.disabled = false;
      btn.textContent = '获取验证码';
    }
  }, 1000);
}

function sendOtp(type) {
  const phoneId = type === 'login' ? 'loginPhone' : 'regPhone';
  const btnId = type === 'login' ? 'loginOtpBtn' : 'regOtpBtn';
  const phone = document.getElementById(phoneId).value.trim();
  if (!/^1[3-9]\d{9}$/.test(phone)) {
    showMsg('请输入正确的手机号');
    return;
  }
  showMsg('验证码已发送（演示模式：请输入 123456）', '#22c55e');
  startCountdown(btnId);
}

function handleLogin() {
  const phone = document.getElementById('loginPhone').value.trim();
  const otp = document.getElementById('loginOtp').value.trim();
  if (!phone || !otp) { showMsg('请填写手机号和验证码'); return; }
  if (otp !== '123456') { showMsg('验证码错误（演示模式请输入 123456）'); return; }
  showMsg('登录成功！正在跳转…', '#22c55e');
  setTimeout(() => { window.location.href = 'index.html'; }, 1200);
}

function handleRegister() {
  const shop = document.getElementById('regShopName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const otp = document.getElementById('regOtp').value.trim();
  const pwd = document.getElementById('regPwd').value;
  const pwd2 = document.getElementById('regPwd2').value;
  const agreed = document.getElementById('regAgree').checked;
  if (!shop) { showMsg('请填写店铺名称'); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { showMsg('请输入正确的手机号'); return; }
  if (otp !== '123456') { showMsg('验证码错误（演示模式请输入 123456）'); return; }
  if (pwd.length < 8) { showMsg('密码至少8位'); return; }
  if (pwd !== pwd2) { showMsg('两次密码不一致'); return; }
  if (!agreed) { showMsg('请勾选同意服务协议'); return; }
  showMsg('注册成功！正在跳转…', '#22c55e');
  setTimeout(() => { window.location.href = 'index.html'; }, 1200);
}
</script>
</body>
</html>
